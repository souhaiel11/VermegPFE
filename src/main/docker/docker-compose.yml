version: '3.8'

services:
  foyer-db:
    image: my-foyer-db
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foyer-db
    ports:
      - '3306:3306'
    environment:
      MYSQL_DATABASE: foyer
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - foyer_db_data:/var/lib/mysql

  springboot-app:
    image: souhaielbloc:latest
    build:
      context: ../../
      dockerfile: src/main/docker/Dockerfile
    container_name: springboot-app
    ports:
      - '8086:8086'
    depends_on:
      - foyer-db

volumes:
  foyer_db_data:
