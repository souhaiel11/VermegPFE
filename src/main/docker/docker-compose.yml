services:
  foyer-db:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    image: my-foyer-db
    container_name: foyer-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: foyer
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - mysql_data:/var/lib/mysql

  springboot-app:
    build:
      context: ../../
      dockerfile: Dockerfile.spring
      args:
        JAR_FILE: Foyer-1.4.0-SNAPSHOT.jar
    image: souhaielbloc:latest
    container_name: springboot-app
    ports:
      - "8086:8086"
    depends_on:
      - foyer-db

volumes:
  mysql_data:
