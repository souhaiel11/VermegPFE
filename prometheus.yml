global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'springboot-app'
    metrics_path: '/Foyer/actuator/prometheus'
    static_configs:
      - targets: ['springboot-app:8086']

  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins:8080']

  - job_name: 'nexus'
    static_configs:
      - targets: ['nexus:8081']